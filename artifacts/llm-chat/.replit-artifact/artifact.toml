kind = "mobile"
previewPath = "/"
title = "Offline LLM Chat"
version = "1.0.0"
id = "artifacts/llm-chat"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20044

[services.development]
run = "pnpm --filter @workspace/llm-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/llm-chat", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/llm-chat", "run", "serve" ]

[services.env]
PORT = "20044"
BASE_PATH = "/"
